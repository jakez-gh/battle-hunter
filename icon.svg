<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Battle Hunter">
  <!-- Original emblem: a gold relic over crossed attack/defense cards on a dark
       dungeon field. Hand-authored vector, no third-party assets. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12131c"/>
      <stop offset="1" stop-color="#06060c"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6e29a"/>
      <stop offset="1" stop-color="#caa23a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#2a2d3e" stroke-width="8"/>
  <!-- crossed cards -->
  <g transform="translate(256 286)">
    <rect x="-120" y="-86" width="150" height="210" rx="16" fill="#3a6ee0" transform="rotate(-18)"/>
    <rect x="-30" y="-86" width="150" height="210" rx="16" fill="#cc4a3a" transform="rotate(18)"/>
  </g>
  <!-- relic gem -->
  <g transform="translate(256 196)">
    <polygon points="0,-104 92,-20 0,104 -92,-20" fill="url(#gem)" stroke="#7a5e1c" stroke-width="6"/>
    <polygon points="0,-104 92,-20 0,-20" fill="#fff7df" opacity="0.55"/>
    <polygon points="0,104 -92,-20 0,-20" fill="#8a6a24" opacity="0.5"/>
  </g>
</svg>
